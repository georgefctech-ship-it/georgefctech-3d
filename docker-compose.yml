services:
  gestor-suprimentos:
    # Opção A: Compilar localmente no TrueNAS (Ideal se você usar o Terminal)
    build: .
    
    # Opção B: Baixar a imagem pronta do GitHub Actions (Ideal para usar no Dockge)
    # Se usar esta opção, comente a linha "build: ." acima e descomente a linha abaixo.
    # Lembre-se de tornar o pacote público no GitHub (veja as instruções no chat)!
    # image: ghcr.io/georgefctech-ship-it/georgefctech-3d-manager:latest

    container_name: gestor_suprimentos_app
    ports:
      - "8090:80"
    restart: unless-stopped
